// ----------------------------------------------------------------------------
// MANUAL VIEW — for older records without barcodes, or barcode misses
// ----------------------------------------------------------------------------
function ManualView() {
  const [artist, setArtist] = useState('');
  const [album,  setAlbum]  = useState('');
  const [lookingUp, setLookingUp] = useState(false);
  const [preview, setPreview] = useState(null);
  const [error, setError] = useState('');
  const [saved, setSaved] = useState(null);

  const lookup = async (e) => {
    e?.preventDefault?.();
    if (!artist.trim() || !album.trim()) {
      setError('Both artist and album required.');
      return;
    }
    setLookingUp(true);
    setError('');
    try {
      const params = new URLSearchParams({ artist: artist.trim(), album: album.trim() });
      const res = await fetch(`${DISCOGS_LOOKUP_URL}?${params}`, {
        headers: { 'Authorization': `Bearer ${SUPABASE_ANON}`, 'apikey': SUPABASE_ANON },
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      if (!data.found) {
        // Offer to save with no enrichment
        setPreview({ record: { artist: artist.trim(), album: album.trim() }, found: false });
      } else {
        setPreview({ ...data, found: true });
      }
    } catch (err) {
      setError(`Lookup failed: ${err.message}`);
    } finally {
      setLookingUp(false);
    }
  };

  const save = async () => {
    if (!preview) return;
    const r = preview.record;
    const { error: e } = await supabase.from('vinyl_inventory').insert({
      artist:           r.artist,
      album:            r.album,
      discogs_id:       r.discogs_id ?? null,
      discogs_url:      r.discogs_url ?? null,
      cover_url:        r.cover_url ?? null,
      year:             r.year ?? null,
      genres:           r.genres ?? [],
      styles:           r.styles ?? [],
      tracklist:        r.tracklist ?? null,
      sides:            r.sides ?? [],
      match_confidence: preview.found ? 'confirmed' : 'unmatched',
      created_by:       'admin-manual',
    });
    if (e) {
      if (e.code === '23505') {
        setError(`That Discogs ID is already in the collection.`);
      } else {
        setError(`Save failed: ${e.message}`);
      }
      return;
    }
    setSaved(r.album);
    setTimeout(() => setSaved(null), 2200);
    setArtist(''); setAlbum(''); setPreview(null);
  };

  return (
    <div className="max-w-xl mx-auto px-4 py-4">
      {saved && (
        <div className="mb-3 p-3 rounded-lg border border-[var(--hop-deep)] bg-[#6dc13520] text-[var(--hop)] font-mono text-sm">
          ✓ Saved: {saved}
        </div>
      )}

      <form onSubmit={lookup} className="space-y-3">
        <label className="block">
          <span className="font-mono text-[10px] uppercase tracking-wider text-[var(--text-faint)]">Artist</span>
          <input
            value={artist} onChange={(e) => setArtist(e.target.value)}
            placeholder="e.g. Pink Floyd"
            className="mt-1 w-full bg-[var(--bg-elev)] border border-[var(--line)] rounded-md px-3 py-2 text-[var(--text)] placeholder:text-[var(--text-faint)] focus:outline-none focus:border-[var(--hop)]"
          />
        </label>
        <label className="block">
          <span className="font-mono text-[10px] uppercase tracking-wider text-[var(--text-faint)]">Album</span>
          <input
            value={album} onChange={(e) => setAlbum(e.target.value)}
            placeholder="e.g. The Dark Side of the Moon"
            className="mt-1 w-full bg-[var(--bg-elev)] border border-[var(--line)] rounded-md px-3 py-2 text-[var(--text)] placeholder:text-[var(--text-faint)] focus:outline-none focus:border-[var(--hop)]"
          />
        </label>
        <button
          type="submit" disabled={lookingUp}
          className="w-full py-3 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-display text-xl tracking-wider hover:brightness-110 disabled:opacity-50 transition"
        >
          {lookingUp ? 'Looking up…' : 'Look up on Discogs'}
        </button>
      </form>

      {error && (
        <div className="mt-3 p-3 rounded-lg border border-red-700 bg-red-900/20 text-red-300 text-sm">
          {error}
        </div>
      )}

      {preview && preview.found && (
        <ScanPreview preview={preview} onSave={save} onReject={() => setPreview(null)} />
      )}

      {preview && !preview.found && (
        <div className="mt-4 p-4 rounded-lg border border-[var(--warn)] bg-[#fbbf2410] sheet-anim">
          <div className="font-mono text-[10px] uppercase tracking-wider text-[var(--warn)] mb-2">
            ◉ No Discogs match
          </div>
          <p className="text-sm text-[var(--text-dim)]">
            Couldn't find <strong className="text-[var(--text)]">{preview.record.artist} — {preview.record.album}</strong> on Discogs.
            Save it anyway with just the artist and album name? (No cover art or tracklist will appear in the patron view.)
          </p>
          <div className="flex gap-2 mt-3">
            <button onClick={() => setPreview(null)}
              className="flex-1 py-2 rounded-lg border border-[var(--line)] text-[var(--text-dim)] font-display tracking-wider hover:border-[var(--text-faint)]">
              Cancel
            </button>
            <button onClick={save}
              className="flex-1 py-2 rounded-lg bg-[var(--warn)] text-[#1a1303] font-display tracking-wider hover:brightness-110">
              Save anyway
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ----------------------------------------------------------------------------
// INVENTORY VIEW — list, filter, edit status, delete
// ----------------------------------------------------------------------------
function InventoryView() {
  const [items, setItems]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [query, setQuery]     = useState('');
  const [editing, setEditing] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const { data, error } = await supabase
      .from('vinyl_inventory')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) console.error(error);
    setItems(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const filtered = useMemo(() => {
    if (!query.trim()) return items;
    const q = query.toLowerCase();
    return items.filter((r) =>
      r.artist?.toLowerCase().includes(q) || r.album?.toLowerCase().includes(q)
    );
  }, [items, query]);

  return (
    <div className="max-w-3xl mx-auto px-4 py-4">
      <div className="relative mb-3">
        <input
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          placeholder="Search inventory…"
          className="w-full bg-[var(--bg-elev)] border border-[var(--line)] rounded-lg px-4 py-2 text-[var(--text)] placeholder:text-[var(--text-faint)] focus:outline-none focus:border-[var(--hop)]"
        />
      </div>
      <div className="font-mono text-[11px] uppercase tracking-wider text-[var(--text-faint)] mb-3">
        {loading ? 'Loading…' : `${filtered.length} of ${items.length} records`}
      </div>

      {loading ? (
        <div className="flex items-center justify-center py-12"><VinylSpinner /></div>
      ) : (
        <ul className="space-y-1.5">
          {filtered.map((r) => (
            <li key={r.id}
              className="flex items-center gap-3 p-2 rounded border border-[var(--line)] bg-[var(--bg-elev)] hover:border-[var(--text-faint)] transition">
              <div className="w-12 h-12 flex-shrink-0 rounded overflow-hidden bg-[var(--bg-card)]">
                <CoverImage src={r.cover_url} alt={r.album} />
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-semibold text-[var(--text)] truncate">{clean(r.album)}</div>
                <div className="text-xs text-[var(--text-dim)] truncate">{clean(r.artist)}{r.year ? ` · ${r.year}` : ''}</div>
              </div>
              {r.status && r.status !== 'available' && (
                <StatusPill status={r.status} />
              )}
              <button
                onClick={() => setEditing(r)}
                className="font-mono text-[10px] uppercase tracking-wider px-2 py-1 rounded text-[var(--text-dim)] hover:text-[var(--hop)] hover:bg-[#6dc13510]"
              >
                Edit
              </button>
            </li>
          ))}
        </ul>
      )}

      {editing && <EditRecord record={editing} onClose={() => setEditing(null)} onSaved={() => { setEditing(null); load(); }} />}
    </div>
  );
}

function EditRecord({ record, onClose, onSaved }) {
  const [status, setStatus] = useState(record.status || 'available');
  const [notes,  setNotes]  = useState(record.notes || '');
  const [saving, setSaving] = useState(false);
  const [error,  setError]  = useState('');

  const save = async () => {
    setSaving(true);
    setError('');
    const { error: e } = await supabase
      .from('vinyl_inventory')
      .update({ status, notes: notes.trim() || null })
      .eq('id', record.id);
    setSaving(false);
    if (e) { setError(e.message); return; }
    onSaved();
  };

  const remove = async () => {
    if (!confirm(`Remove "${record.album}" by ${record.artist} from the collection?`)) return;
    setSaving(true);
    const { error: e } = await supabase.from('vinyl_inventory').delete().eq('id', record.id);
    setSaving(false);
    if (e) { setError(e.message); return; }
    onSaved();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center scrim-anim"
      style={{ background: 'rgba(0,0,0,0.78)', backdropFilter: 'blur(4px)' }}
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sheet-anim bg-[var(--bg-elev)] border-t sm:border border-[var(--line)] rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md p-5 safe-bottom">
        <div className="flex items-start gap-3 mb-4">
          <div className="w-16 h-16 flex-shrink-0 rounded overflow-hidden">
            <CoverImage src={record.cover_url} alt={record.album} />
          </div>
          <div className="flex-1 min-w-0">
            <div className="font-display text-xl text-[var(--text)] leading-none">{clean(record.album)}</div>
            <div className="text-sm text-[var(--text-dim)] mt-1">{clean(record.artist)}</div>
          </div>
          <button onClick={onClose} className="text-[var(--text-dim)] hover:text-[var(--text)] text-2xl leading-none">×</button>
        </div>

        <label className="block mb-3">
          <span className="font-mono text-[10px] uppercase tracking-wider text-[var(--text-faint)]">Status</span>
          <select value={status} onChange={(e) => setStatus(e.target.value)}
            className="mt-1 w-full bg-[var(--bg)] border border-[var(--line)] rounded-md px-3 py-2 text-[var(--text)] focus:outline-none focus:border-[var(--hop)]">
            <option value="available">Available</option>
            <option value="playing">On the deck</option>
            <option value="featured">★ Featured</option>
            <option value="damaged">Damaged</option>
            <option value="missing">Missing</option>
          </select>
        </label>

        <label className="block mb-4">
          <span className="font-mono text-[10px] uppercase tracking-wider text-[var(--text-faint)]">Staff notes</span>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows={2}
            placeholder="Bin location, condition, etc."
            className="mt-1 w-full bg-[var(--bg)] border border-[var(--line)] rounded-md px-3 py-2 text-[var(--text)] placeholder:text-[var(--text-faint)] focus:outline-none focus:border-[var(--hop)] resize-none" />
        </label>

        {error && <div className="text-sm text-red-400 mb-3">{error}</div>}

        <div className="flex gap-2">
          <button onClick={remove} disabled={saving}
            className="px-3 py-2 rounded-lg border border-red-800 text-red-400 font-mono text-[11px] uppercase tracking-wider hover:bg-red-900/20 disabled:opacity-50">
            Delete
          </button>
          <button onClick={onClose} className="flex-1 py-2 rounded-lg border border-[var(--line)] text-[var(--text-dim)] font-display tracking-wider">
            Cancel
          </button>
          <button onClick={save} disabled={saving}
            className="flex-1 py-2 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-display tracking-wider hover:brightness-110 disabled:opacity-50">
            {saving ? 'Saving…' : 'Save'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ----------------------------------------------------------------------------
// WISHLIST ADMIN VIEW — promote to "ordered", mark "acquired", or decline
// ----------------------------------------------------------------------------
function WishlistAdminView() {
  const [items, setItems]     = useState([]);
  const [subscribers, setSubscribers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView]       = useState('requests'); // 'requests' | 'subscribers'
  const [copyFlash, setCopyFlash] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const [{ data: w, error: e1 }, { data: s, error: e2 }] = await Promise.all([
      supabase.from('vinyl_wishlist').select('*').order('vote_count', { ascending: false }),
      supabase.from('email_subscribers').select('*').order('subscribed_at', { ascending: false }),
    ]);
    if (e1) console.error(e1);
    if (e2) console.error(e2);
    setItems(w || []);
    setSubscribers(s || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const setStatus = async (item, status) => {
    const { error } = await supabase.from('vinyl_wishlist').update({ status }).eq('id', item.id);
    if (error) { alert(error.message); return; }
    load();
  };

  const markNotified = async (item) => {
    const { error } = await supabase.from('vinyl_wishlist').update({ notified_at: new Date().toISOString() }).eq('id', item.id);
    if (error) { alert(error.message); return; }
    load();
  };

  const unsubscribe = async (sub) => {
    if (!confirm(`Unsubscribe ${sub.email}?`)) return;
    const { error } = await supabase
      .from('email_subscribers')
      .update({ unsubscribed_at: new Date().toISOString() })
      .eq('email', sub.email);
    if (error) { alert(error.message); return; }
    load();
  };

  const copyToClipboard = async (text, label) => {
    try {
      await navigator.clipboard.writeText(text);
      setCopyFlash(label);
      setTimeout(() => setCopyFlash(null), 1800);
    } catch {
      // Fallback: select + execCommand for older browsers
      alert(`Copy this:\n\n${text}`);
    }
  };

  // Aggregate "people to notify when a given record arrives" across all
  // wishlist requests for the same artist+album (in case multiple patrons
  // requested the same record separately).
  const notifyEmailsFor = (item) => {
    const key = `${item.artist}|${item.album}`.toLowerCase();
    return [...new Set(
      items
        .filter((r) => `${r.artist}|${r.album}`.toLowerCase() === key)
        .filter((r) => r.notify_on_acquired && r.submitter_email)
        .map((r) => r.submitter_email)
    )];
  };

  const allActiveSubscribers = subscribers.filter((s) => !s.unsubscribed_at);

  return (
    <div className="max-w-3xl mx-auto px-4 py-4">
      {copyFlash && (
        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-mono text-sm shadow-[0_0_24px_var(--hop-glow)] sheet-anim">
          ✓ Copied {copyFlash}
        </div>
      )}

      {/* Sub-tabs */}
      <div className="flex items-center gap-2 mb-4 border-b border-[var(--line)] -mx-4 px-4">
        <button
          onClick={() => setView('requests')}
          className={`font-display text-base pb-2 px-1 transition-colors ${
            view === 'requests' ? 'tab-active' : 'text-[var(--text-dim)] hover:text-[var(--text)]'
          }`}>
          Requests <span className="text-[var(--text-faint)] text-xs">({items.length})</span>
        </button>
        <button
          onClick={() => setView('subscribers')}
          className={`font-display text-base pb-2 px-1 transition-colors ${
            view === 'subscribers' ? 'tab-active' : 'text-[var(--text-dim)] hover:text-[var(--text)]'
          }`}>
          Newsletter <span className="text-[var(--text-faint)] text-xs">({allActiveSubscribers.length})</span>
        </button>
      </div>

      {loading ? (
        <div className="flex items-center justify-center py-12"><VinylSpinner /></div>
      ) : view === 'requests' ? (
        items.length === 0 ? (
          <div className="text-center text-[var(--text-faint)] py-12">No wishlist items yet.</div>
        ) : (
          <>
            <div className="mb-3 flex items-center gap-2 flex-wrap">
              <button
                onClick={() => {
                  const csv = buildCsv(items, [
                    ['artist',               'artist'],
                    ['album',                'album'],
                    ['vote_count',           'votes'],
                    ['status',               'status'],
                    ['submitter_email',      'email'],
                    ['submitted_by',         'submitted_by'],
                    ['note',                 'note'],
                    ['notify_on_acquired',   'notify_on_acquired'],
                    ['subscribe_newsletter', 'subscribe_newsletter'],
                    ['notified_at',          'notified_at'],
                    ['created_at',           'created_at'],
                  ]);
                  downloadFile(`igb-wishlist-${ymd()}.csv`, csv);
                }}
                className="text-[11px] font-mono uppercase tracking-wider px-3 py-1.5 rounded border border-[var(--hop)] text-[var(--hop)] hover:bg-[#6dc13510]">
                ↓ Export wishlist CSV ({items.length})
              </button>
              <span className="text-[11px] font-mono text-[var(--text-faint)]">
                · everything below as a spreadsheet
              </span>
            </div>
            <ul className="space-y-2">
              {items.map((it) => {
                const notifyEmails = notifyEmailsFor(it);
                return (
                  <li key={it.id} className="p-3 rounded-lg border border-[var(--line)] bg-[var(--bg-elev)]">
                    <div className="flex items-start gap-3">
                    <div className="font-display text-2xl text-[var(--hop)] leading-none w-10 text-center">{it.vote_count}</div>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-[var(--text)]">{clean(it.album)}</div>
                      <div className="text-sm text-[var(--text-dim)]">{clean(it.artist)}</div>
                      {it.note && <div className="text-[11px] italic text-[var(--text-faint)] mt-1">"{it.note}"{it.submitted_by ? ` — ${it.submitted_by}` : ''}</div>}
                      {/* Submitter contact info */}
                      {(it.submitter_email || it.notify_on_acquired) && (
                        <div className="mt-2 p-2 rounded bg-[var(--bg)] border border-[var(--line)] text-[11px] font-mono">
                          {it.submitter_email && (
                            <div className="flex items-center gap-2">
                              <span className="text-[var(--text-faint)]">✉</span>
                              <span className="text-[var(--text-dim)] truncate">{it.submitter_email}</span>
                              <button
                                onClick={() => copyToClipboard(it.submitter_email, 'email')}
                                className="ml-auto text-[var(--text-faint)] hover:text-[var(--hop)]"
                                aria-label="Copy email"
                              >Copy</button>
                            </div>
                          )}
                          <div className="flex gap-3 mt-1 text-[10px] uppercase tracking-wider">
                            {it.notify_on_acquired && (
                              <span className={it.notified_at ? 'text-[var(--text-faint)] line-through' : 'text-[var(--hop)]'}>
                                ◉ wants notification
                                {it.notified_at && ' · sent'}
                              </span>
                            )}
                            {it.subscribe_newsletter && (
                              <span className="text-[var(--hop)]">◉ newsletter</span>
                            )}
                          </div>
                        </div>
                      )}
                      <div className="font-mono text-[10px] uppercase tracking-wider mt-2">
                        Status: <span className="text-[var(--text-dim)]">{it.status}</span>
                      </div>
                    </div>
                  </div>

                  {/* Notify-list shortcut: when status is acquired and there are emails to notify */}
                  {it.status === 'acquired' && notifyEmails.length > 0 && !it.notified_at && (
                    <div className="mt-3 p-2 rounded border border-[var(--hop-deep)] bg-[#6dc1350a]">
                      <div className="text-[11px] font-mono text-[var(--hop)] mb-1.5">
                        ✦ {notifyEmails.length} {notifyEmails.length === 1 ? 'person wants' : 'people want'} to know this arrived
                      </div>
                      <div className="flex gap-2 flex-wrap">
                        <button
                          onClick={() => copyToClipboard(notifyEmails.join(', '), `${notifyEmails.length} email${notifyEmails.length === 1 ? '' : 's'}`)}
                          className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded bg-[var(--hop)] text-[#0a1a02]">
                          Copy emails for bcc
                        </button>
                        <a
                          href={`mailto:?bcc=${encodeURIComponent(notifyEmails.join(','))}&subject=${encodeURIComponent(`Inner Groove: "${it.album}" is in the collection!`)}&body=${encodeURIComponent(`Hey — you asked us to grab ${it.artist} - ${it.album} for the brewery. It's in! Come spin it next time you're in.\n\n— Inner Groove`)}`}
                          className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--hop)] text-[var(--hop)] hover:bg-[#6dc13510]">
                          Open in mail
                        </a>
                        <button
                          onClick={() => markNotified(it)}
                          className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--line)] text-[var(--text-dim)] hover:border-[var(--text-faint)]">
                          Mark sent
                        </button>
                      </div>
                    </div>
                  )}

                  <div className="flex gap-2 mt-3 flex-wrap">
                    {it.status !== 'open' && (
                      <button onClick={() => setStatus(it, 'open')}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--line)] text-[var(--text-dim)] hover:border-[var(--text-faint)]">
                        Reopen
                      </button>
                    )}
                    {it.status !== 'ordered' && (
                      <button onClick={() => setStatus(it, 'ordered')}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--warn)] text-[var(--warn)] hover:bg-[#fbbf2410]">
                        Mark ordered
                      </button>
                    )}
                    {it.status !== 'acquired' && (
                      <button onClick={() => setStatus(it, 'acquired')}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--hop)] text-[var(--hop)] hover:bg-[#6dc13510]">
                        Mark acquired
                      </button>
                    )}
                    {it.status !== 'declined' && (
                      <button onClick={() => setStatus(it, 'declined')}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-red-800 text-red-400 hover:bg-red-900/10">
                        Decline
                      </button>
                    )}
                  </div>
                </li>
              );
            })}
            </ul>
          </>
        )
      ) : (
        // Newsletter subscribers view
        <div>
          {allActiveSubscribers.length === 0 ? (
            <div className="text-center text-[var(--text-faint)] py-12">No newsletter subscribers yet.</div>
          ) : (
            <>
              <div className="mb-3 flex items-center gap-2 flex-wrap">
                <button
                  onClick={() => copyToClipboard(
                    allActiveSubscribers.map((s) => s.email).join(', '),
                    `${allActiveSubscribers.length} email${allActiveSubscribers.length === 1 ? '' : 's'}`
                  )}
                  className="text-[11px] font-mono uppercase tracking-wider px-3 py-1.5 rounded bg-[var(--hop)] text-[#0a1a02]">
                  Copy all {allActiveSubscribers.length} emails
                </button>
                <button
                  onClick={() => {
                    const csv = buildCsv(subscribers, [
                      ['email',           'email'],
                      ['source',          'source'],
                      ['subscribed_at',   'subscribed_at'],
                      ['unsubscribed_at', 'unsubscribed_at'],
                      ['notes',           'notes'],
                    ]);
                    downloadFile(`igb-newsletter-${ymd()}.csv`, csv);
                  }}
                  className="text-[11px] font-mono uppercase tracking-wider px-3 py-1.5 rounded border border-[var(--hop)] text-[var(--hop)] hover:bg-[#6dc13510]">
                  ↓ Export CSV ({subscribers.length})
                </button>
                <span className="text-[11px] font-mono text-[var(--text-faint)]">
                  · paste into bcc, or import to Mailchimp
                </span>
              </div>
              <ul className="space-y-1.5">
                {subscribers.map((s) => (
                  <li key={s.email}
                    className={`flex items-center gap-2 p-2 rounded border ${
                      s.unsubscribed_at ? 'border-[var(--line)] opacity-50' : 'border-[var(--line)] bg-[var(--bg-elev)]'
                    }`}>
                    <span className="font-mono text-sm text-[var(--text)] flex-1 truncate">{s.email}</span>
                    <span className="font-mono text-[10px] text-[var(--text-faint)] uppercase tracking-wider">
                      {s.unsubscribed_at ? 'unsub' : new Date(s.subscribed_at).toLocaleDateString()}
                    </span>
                    {!s.unsubscribed_at && (
                      <button onClick={() => unsubscribe(s)}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-0.5 rounded text-[var(--text-faint)] hover:text-red-400">
                        Unsub
                      </button>
                    )}
                  </li>
                ))}
              </ul>
              <p className="mt-4 text-[10px] text-[var(--text-faint)] leading-relaxed">
                Subscribers come from the wishlist newsletter checkbox. Use the
                "Copy all" button to grab the list and paste into bcc when sending
                from your email client. (No automated sending from here yet.)
              </p>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ----------------------------------------------------------------------------
// ADMIN APP SHELL
// ----------------------------------------------------------------------------
function AdminApp() {
  const [unlocked, setUnlocked] = useState(() => {
    try { return sessionStorage.getItem('igb_vinyl_admin_unlocked') === '1'; }
    catch { return false; }
  });
  const [view, setView] = useState('scan');

  if (!unlocked) return <PinGate onUnlock={() => setUnlocked(true)} />;

  return (
    <>
      <AdminHeader view={view} setView={setView} />
      {view === 'scan'      && <ScanView />}
      {view === 'manual'    && <ManualView />}
      {view === 'inventory' && <InventoryView />}
      {view === 'wishlist'  && <WishlistAdminView />}
      <footer className="max-w-3xl mx-auto px-4 py-8 text-center font-mono text-[10px] tracking-[0.2em] uppercase text-[var(--text-faint)]">
        Inner Groove Brewing · Staff Console
      </footer>
    </>
  );
}

// ============================================================================
// APP SHELL
// ============================================================================
function App() {
  const [tab, setTab]             = useState('browse');
  const [inventory, setInventory] = useState([]);
  const [loading, setLoading]     = useState(true);

  // Load inventory once on mount
  useEffect(() => {
    let cancelled = false;
    (async () => {
      // Pagination is unnecessary at 170 rows but future-proofs it
      const { data, error } = await supabase
        .from('vinyl_inventory')
        .select('id, artist, album, year, genres, styles, cover_url, discogs_url, tracklist, sides, status, created_at')
        .order('artist', { ascending: true });
      if (!cancelled) {
        if (error) console.error(error);
        setInventory(data || []);
        setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  return (
    <>
      <Header tab={tab} setTab={setTab} />
      {tab === 'browse'   && <BrowseTab inventory={inventory} loading={loading} />}
      {tab === 'wishlist' && <WishlistTab />}
      <footer className="max-w-5xl mx-auto px-4 py-8 text-center font-mono text-[10px] tracking-[0.2em] uppercase text-[var(--text-faint)]">
        Inner Groove Brewing · Verona, PA
      </footer>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));

// Route based on URL path. Vercel rewrites /admin → /index.html so we can
// inspect window.location.pathname to decide which app to render.
const isAdmin = window.location.pathname.replace(/\/$/, '') === '/admin';
root.render(isAdmin ? <AdminApp /> : <App />);
</script>
</body>
