      .order('created_at', { ascending: false });
    if (error) console.error(error);
    setItems(data || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const filtered = useMemo(() => {
    if (!query.trim()) return items;
    const q = query.toLowerCase();
    return items.filter((r) =>
      r.artist?.toLowerCase().includes(q) || r.album?.toLowerCase().includes(q)
    );
  }, [items, query]);

  return (
    <div className="max-w-3xl mx-auto px-4 py-4">
      <div className="relative mb-3">
        <input
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          placeholder="Search inventory…"
          className="w-full bg-[var(--bg-elev)] border border-[var(--line)] rounded-lg px-4 py-2 text-[var(--text)] placeholder:text-[var(--text-faint)] focus:outline-none focus:border-[var(--hop)]"
        />
      </div>
      <div className="font-mono text-[11px] uppercase tracking-wider text-[var(--text-faint)] mb-3">
        {loading ? 'Loading…' : `${filtered.length} of ${items.length} records`}
      </div>

      {loading ? (
        <div className="flex items-center justify-center py-12"><VinylSpinner /></div>
      ) : (
        <ul className="space-y-1.5">
          {filtered.map((r) => (
            <li key={r.id}
              className="flex items-center gap-3 p-2 rounded border border-[var(--line)] bg-[var(--bg-elev)] hover:border-[var(--text-faint)] transition">
              <div className="w-12 h-12 flex-shrink-0 rounded overflow-hidden bg-[var(--bg-card)]">
                <CoverImage src={r.cover_url} alt={r.album} />
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-semibold text-[var(--text)] truncate">{clean(r.album)}</div>
                <div className="text-xs text-[var(--text-dim)] truncate">{clean(r.artist)}{r.year ? ` · ${r.year}` : ''}</div>
              </div>
              {r.status && r.status !== 'available' && (
                <StatusPill status={r.status} />
              )}
              <button
                onClick={() => setEditing(r)}
                className="font-mono text-[10px] uppercase tracking-wider px-2 py-1 rounded text-[var(--text-dim)] hover:text-[var(--hop)] hover:bg-[#6dc13510]"
              >
                Edit
              </button>
            </li>
          ))}
        </ul>
      )}

      {editing && <EditRecord record={editing} onClose={() => setEditing(null)} onSaved={() => { setEditing(null); load(); }} />}
    </div>
  );
}

function EditRecord({ record, onClose, onSaved }) {
  const [status, setStatus] = useState(record.status || 'available');
  const [notes,  setNotes]  = useState(record.notes || '');
  const [saving, setSaving] = useState(false);
  const [error,  setError]  = useState('');

  const save = async () => {
    setSaving(true);
    setError('');
    const { error: e } = await supabase
      .from('vinyl_inventory')
      .update({ status, notes: notes.trim() || null })
      .eq('id', record.id);
    setSaving(false);
    if (e) { setError(e.message); return; }
    onSaved();
  };

  const remove = async () => {
    if (!confirm(`Remove "${record.album}" by ${record.artist} from the collection?`)) return;
    setSaving(true);
    const { error: e } = await supabase.from('vinyl_inventory').delete().eq('id', record.id);
    setSaving(false);
    if (e) { setError(e.message); return; }
    onSaved();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center scrim-anim"
      style={{ background: 'rgba(0,0,0,0.78)', backdropFilter: 'blur(4px)' }}
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sheet-anim bg-[var(--bg-elev)] border-t sm:border border-[var(--line)] rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md p-5 safe-bottom">
        <div className="flex items-start gap-3 mb-4">
          <div className="w-16 h-16 flex-shrink-0 rounded overflow-hidden">
            <CoverImage src={record.cover_url} alt={record.album} />
          </div>
          <div className="flex-1 min-w-0">
            <div className="font-display text-xl text-[var(--text)] leading-none">{clean(record.album)}</div>
            <div className="text-sm text-[var(--text-dim)] mt-1">{clean(record.artist)}</div>
          </div>
          <button onClick={onClose} className="text-[var(--text-dim)] hover:text-[var(--text)] text-2xl leading-none">×</button>
        </div>

        <label className="block mb-3">
          <span className="font-mono text-[10px] uppercase tracking-wider text-[var(--text-faint)]">Status</span>
          <select value={status} onChange={(e) => setStatus(e.target.value)}
            className="mt-1 w-full bg-[var(--bg)] border border-[var(--line)] rounded-md px-3 py-2 text-[var(--text)] focus:outline-none focus:border-[var(--hop)]">
            <option value="available">Available</option>
            <option value="playing">On the deck</option>
            <option value="featured">★ Featured</option>
            <option value="damaged">Damaged</option>
            <option value="missing">Missing</option>
          </select>
        </label>

        <label className="block mb-4">
          <span className="font-mono text-[10px] uppercase tracking-wider text-[var(--text-faint)]">Staff notes</span>
          <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows={2}
            placeholder="Bin location, condition, etc."
            className="mt-1 w-full bg-[var(--bg)] border border-[var(--line)] rounded-md px-3 py-2 text-[var(--text)] placeholder:text-[var(--text-faint)] focus:outline-none focus:border-[var(--hop)] resize-none" />
        </label>

        {error && <div className="text-sm text-red-400 mb-3">{error}</div>}

        <div className="flex gap-2">
          <button onClick={remove} disabled={saving}
            className="px-3 py-2 rounded-lg border border-red-800 text-red-400 font-mono text-[11px] uppercase tracking-wider hover:bg-red-900/20 disabled:opacity-50">
            Delete
          </button>
          <button onClick={onClose} className="flex-1 py-2 rounded-lg border border-[var(--line)] text-[var(--text-dim)] font-display tracking-wider">
            Cancel
          </button>
          <button onClick={save} disabled={saving}
            className="flex-1 py-2 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-display tracking-wider hover:brightness-110 disabled:opacity-50">
            {saving ? 'Saving…' : 'Save'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ----------------------------------------------------------------------------
// WISHLIST ADMIN VIEW — promote to "ordered", mark "acquired", or decline
// ----------------------------------------------------------------------------
function WishlistAdminView() {
  const [items, setItems]     = useState([]);
  const [subscribers, setSubscribers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [view, setView]       = useState('requests'); // 'requests' | 'subscribers'
  const [copyFlash, setCopyFlash] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const [{ data: w, error: e1 }, { data: s, error: e2 }] = await Promise.all([
      supabase.from('vinyl_wishlist').select('*').order('vote_count', { ascending: false }),
      supabase.from('email_subscribers').select('*').order('subscribed_at', { ascending: false }),
    ]);
    if (e1) console.error(e1);
    if (e2) console.error(e2);
    setItems(w || []);
    setSubscribers(s || []);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const setStatus = async (item, status) => {
    const { error } = await supabase.from('vinyl_wishlist').update({ status }).eq('id', item.id);
    if (error) { alert(error.message); return; }
    load();
  };

  const markNotified = async (item) => {
    const { error } = await supabase.from('vinyl_wishlist').update({ notified_at: new Date().toISOString() }).eq('id', item.id);
    if (error) { alert(error.message); return; }
    load();
  };

  const unsubscribe = async (sub) => {
    if (!confirm(`Unsubscribe ${sub.email}?`)) return;
    const { error } = await supabase
      .from('email_subscribers')
      .update({ unsubscribed_at: new Date().toISOString() })
      .eq('email', sub.email);
    if (error) { alert(error.message); return; }
    load();
  };

  const copyToClipboard = async (text, label) => {
    try {
      await navigator.clipboard.writeText(text);
      setCopyFlash(label);
      setTimeout(() => setCopyFlash(null), 1800);
    } catch {
      // Fallback: select + execCommand for older browsers
      alert(`Copy this:\n\n${text}`);
    }
  };

  // Aggregate "people to notify when a given record arrives" across all
  // wishlist requests for the same artist+album (in case multiple patrons
  // requested the same record separately).
  const notifyEmailsFor = (item) => {
    const key = `${item.artist}|${item.album}`.toLowerCase();
    return [...new Set(
      items
        .filter((r) => `${r.artist}|${r.album}`.toLowerCase() === key)
        .filter((r) => r.notify_on_acquired && r.submitter_email)
        .map((r) => r.submitter_email)
    )];
  };

  const allActiveSubscribers = subscribers.filter((s) => !s.unsubscribed_at);

  return (
    <div className="max-w-3xl mx-auto px-4 py-4">
      {copyFlash && (
        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-mono text-sm shadow-[0_0_24px_var(--hop-glow)] sheet-anim">
          ✓ Copied {copyFlash}
        </div>
      )}

      {/* Sub-tabs */}
      <div className="flex items-center gap-2 mb-4 border-b border-[var(--line)] -mx-4 px-4">
        <button
          onClick={() => setView('requests')}
          className={`font-display text-base pb-2 px-1 transition-colors ${
            view === 'requests' ? 'tab-active' : 'text-[var(--text-dim)] hover:text-[var(--text)]'
          }`}>
          Requests <span className="text-[var(--text-faint)] text-xs">({items.length})</span>
        </button>
        <button
          onClick={() => setView('subscribers')}
          className={`font-display text-base pb-2 px-1 transition-colors ${
            view === 'subscribers' ? 'tab-active' : 'text-[var(--text-dim)] hover:text-[var(--text)]'
          }`}>
          Newsletter <span className="text-[var(--text-faint)] text-xs">({allActiveSubscribers.length})</span>
        </button>
      </div>

      {loading ? (
        <div className="flex items-center justify-center py-12"><VinylSpinner /></div>
      ) : view === 'requests' ? (
        items.length === 0 ? (
          <div className="text-center text-[var(--text-faint)] py-12">No wishlist items yet.</div>
        ) : (
          <>
            <div className="mb-3 flex items-center gap-2 flex-wrap">
              <button
                onClick={() => {
                  const csv = buildCsv(items, [
                    ['artist',               'artist'],
                    ['album',                'album'],
                    ['vote_count',           'votes'],
                    ['status',               'status'],
                    ['submitter_email',      'email'],
                    ['submitted_by',         'submitted_by'],
                    ['note',                 'note'],
                    ['notify_on_acquired',   'notify_on_acquired'],
                    ['subscribe_newsletter', 'subscribe_newsletter'],
                    ['notified_at',          'notified_at'],
                    ['created_at',           'created_at'],
                  ]);
                  downloadFile(`igb-wishlist-${ymd()}.csv`, csv);
                }}
                className="text-[11px] font-mono uppercase tracking-wider px-3 py-1.5 rounded border border-[var(--hop)] text-[var(--hop)] hover:bg-[#6dc13510]">
                ↓ Export wishlist CSV ({items.length})
              </button>
              <span className="text-[11px] font-mono text-[var(--text-faint)]">
                · everything below as a spreadsheet
              </span>
            </div>
            <ul className="space-y-2">
              {items.map((it) => {
                const notifyEmails = notifyEmailsFor(it);
                return (
                  <li key={it.id} className="p-3 rounded-lg border border-[var(--line)] bg-[var(--bg-elev)]">
                    <div className="flex items-start gap-3">
                    <div className="font-display text-2xl text-[var(--hop)] leading-none w-10 text-center">{it.vote_count}</div>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-[var(--text)]">{clean(it.album)}</div>
                      <div className="text-sm text-[var(--text-dim)]">{clean(it.artist)}</div>
                      {it.note && <div className="text-[11px] italic text-[var(--text-faint)] mt-1">"{it.note}"{it.submitted_by ? ` — ${it.submitted_by}` : ''}</div>}
                      {/* Submitter contact info */}
                      {(it.submitter_email || it.notify_on_acquired) && (
                        <div className="mt-2 p-2 rounded bg-[var(--bg)] border border-[var(--line)] text-[11px] font-mono">
                          {it.submitter_email && (
                            <div className="flex items-center gap-2">
                              <span className="text-[var(--text-faint)]">✉</span>
                              <span className="text-[var(--text-dim)] truncate">{it.submitter_email}</span>
                              <button
                                onClick={() => copyToClipboard(it.submitter_email, 'email')}
                                className="ml-auto text-[var(--text-faint)] hover:text-[var(--hop)]"
                                aria-label="Copy email"
                              >Copy</button>
                            </div>
                          )}
                          <div className="flex gap-3 mt-1 text-[10px] uppercase tracking-wider">
                            {it.notify_on_acquired && (
                              <span className={it.notified_at ? 'text-[var(--text-faint)] line-through' : 'text-[var(--hop)]'}>
                                ◉ wants notification
                                {it.notified_at && ' · sent'}
                              </span>
                            )}
                            {it.subscribe_newsletter && (
                              <span className="text-[var(--hop)]">◉ newsletter</span>
                            )}
                          </div>
                        </div>
                      )}
                      <div className="font-mono text-[10px] uppercase tracking-wider mt-2">
                        Status: <span className="text-[var(--text-dim)]">{it.status}</span>
                      </div>
                    </div>
                  </div>

                  {/* Notify-list shortcut: when status is acquired and there are emails to notify */}
                  {it.status === 'acquired' && notifyEmails.length > 0 && !it.notified_at && (
                    <div className="mt-3 p-2 rounded border border-[var(--hop-deep)] bg-[#6dc1350a]">
                      <div className="text-[11px] font-mono text-[var(--hop)] mb-1.5">
                        ✦ {notifyEmails.length} {notifyEmails.length === 1 ? 'person wants' : 'people want'} to know this arrived
                      </div>
                      <div className="flex gap-2 flex-wrap">
                        <button
                          onClick={() => copyToClipboard(notifyEmails.join(', '), `${notifyEmails.length} email${notifyEmails.length === 1 ? '' : 's'}`)}
                          className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded bg-[var(--hop)] text-[#0a1a02]">
                          Copy emails for bcc
                        </button>
                        <a
                          href={`mailto:?bcc=${encodeURIComponent(notifyEmails.join(','))}&subject=${encodeURIComponent(`Inner Groove: "${it.album}" is in the collection!`)}&body=${encodeURIComponent(`Hey — you asked us to grab ${it.artist} - ${it.album} for the brewery. It's in! Come spin it next time you're in.\n\n— Inner Groove`)}`}
                          className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--hop)] text-[var(--hop)] hover:bg-[#6dc13510]">
                          Open in mail
                        </a>
                        <button
                          onClick={() => markNotified(it)}
                          className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--line)] text-[var(--text-dim)] hover:border-[var(--text-faint)]">
                          Mark sent
                        </button>
                      </div>
                    </div>
                  )}

                  <div className="flex gap-2 mt-3 flex-wrap">
                    {it.status !== 'open' && (
                      <button onClick={() => setStatus(it, 'open')}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--line)] text-[var(--text-dim)] hover:border-[var(--text-faint)]">
                        Reopen
                      </button>
                    )}
                    {it.status !== 'ordered' && (
                      <button onClick={() => setStatus(it, 'ordered')}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--warn)] text-[var(--warn)] hover:bg-[#fbbf2410]">
                        Mark ordered
                      </button>
                    )}
                    {it.status !== 'acquired' && (
                      <button onClick={() => setStatus(it, 'acquired')}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-[var(--hop)] text-[var(--hop)] hover:bg-[#6dc13510]">
                        Mark acquired
                      </button>
                    )}
                    {it.status !== 'declined' && (
                      <button onClick={() => setStatus(it, 'declined')}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-1 rounded border border-red-800 text-red-400 hover:bg-red-900/10">
                        Decline
                      </button>
                    )}
                  </div>
                </li>
              );
            })}
            </ul>
          </>
        )
      ) : (
        // Newsletter subscribers view
        <div>
          {allActiveSubscribers.length === 0 ? (
            <div className="text-center text-[var(--text-faint)] py-12">No newsletter subscribers yet.</div>
          ) : (
            <>
              <div className="mb-3 flex items-center gap-2 flex-wrap">
                <button
                  onClick={() => copyToClipboard(
                    allActiveSubscribers.map((s) => s.email).join(', '),
                    `${allActiveSubscribers.length} email${allActiveSubscribers.length === 1 ? '' : 's'}`
                  )}
                  className="text-[11px] font-mono uppercase tracking-wider px-3 py-1.5 rounded bg-[var(--hop)] text-[#0a1a02]">
                  Copy all {allActiveSubscribers.length} emails
                </button>
                <button
                  onClick={() => {
                    const csv = buildCsv(subscribers, [
                      ['email',           'email'],
                      ['source',          'source'],
                      ['subscribed_at',   'subscribed_at'],
                      ['unsubscribed_at', 'unsubscribed_at'],
                      ['notes',           'notes'],
                    ]);
                    downloadFile(`igb-newsletter-${ymd()}.csv`, csv);
                  }}
                  className="text-[11px] font-mono uppercase tracking-wider px-3 py-1.5 rounded border border-[var(--hop)] text-[var(--hop)] hover:bg-[#6dc13510]">
                  ↓ Export CSV ({subscribers.length})
                </button>
                <span className="text-[11px] font-mono text-[var(--text-faint)]">
                  · paste into bcc, or import to Mailchimp
                </span>
              </div>
              <ul className="space-y-1.5">
                {subscribers.map((s) => (
                  <li key={s.email}
                    className={`flex items-center gap-2 p-2 rounded border ${
                      s.unsubscribed_at ? 'border-[var(--line)] opacity-50' : 'border-[var(--line)] bg-[var(--bg-elev)]'
                    }`}>
                    <span className="font-mono text-sm text-[var(--text)] flex-1 truncate">{s.email}</span>
                    <span className="font-mono text-[10px] text-[var(--text-faint)] uppercase tracking-wider">
                      {s.unsubscribed_at ? 'unsub' : new Date(s.subscribed_at).toLocaleDateString()}
                    </span>
                    {!s.unsubscribed_at && (
                      <button onClick={() => unsubscribe(s)}
                        className="text-[10px] font-mono uppercase tracking-wider px-2 py-0.5 rounded text-[var(--text-faint)] hover:text-red-400">
                        Unsub
                      </button>
                    )}
                  </li>
                ))}
              </ul>
              <p className="mt-4 text-[10px] text-[var(--text-faint)] leading-relaxed">
                Subscribers come from the wishlist newsletter checkbox. Use the
                "Copy all" button to grab the list and paste into bcc when sending
                from your email client. (No automated sending from here yet.)
              </p>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ----------------------------------------------------------------------------
// SLIDES VIEW — manage the TV display slides + trigger Drive sync
// ----------------------------------------------------------------------------
function SlidesView() {
  const [slides, setSlides] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [msg, setMsg] = useState('');

  const loadSlides = useCallback(async () => {
    const { data } = await supabase
      .from('display_slides')
      .select('*')
      .order('sort_order', { ascending: true });
    setSlides(data || []);
    setLoading(false);
  }, []);

  const loadLastSync = useCallback(async () => {
    const { data } = await supabase
      .from('app_settings')
      .select('value')
      .eq('key', 'slides_last_sync')
      .maybeSingle();
    setLastSync(data?.value || null);
  }, []);

  useEffect(() => {
    loadSlides();
    loadLastSync();
    const ch = supabase
      .channel('admin_slides_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'display_slides' }, loadSlides)
      .subscribe();
    return () => { supabase.removeChannel(ch); };
  }, [loadSlides, loadLastSync]);

  const syncNow = async () => {
    setSyncing(true);
    setMsg('');
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/sync-slides`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_ANON}`,
        },
        body: '{}',
      });
      const data = await res.json();
      if (!res.ok || data.error) {
        setMsg(`Sync failed: ${data.error || res.status}`);
      } else {
        setMsg(`Synced — ${data.added} added, ${data.updated} updated, ${data.removed} removed, ${data.unchanged} unchanged.`);
      }
    } catch (e) {
      setMsg(`Sync error: ${e.message}`);
    }
    setSyncing(false);
    loadSlides();
    loadLastSync();
  };

  const fmtTime = (iso) => {
    if (!iso) return 'never';
    try { return new Date(iso).toLocaleString(); } catch { return iso; }
  };

  return (
    <div className="max-w-3xl mx-auto px-4 py-5">
      <div className="flex items-center justify-between mb-4 gap-3">
        <div>
          <h2 className="font-display text-2xl text-[var(--text)] leading-none">Display Slides</h2>
          <p className="text-sm text-[var(--text-dim)] mt-1">
            Slides shown on the taproom TV. Synced from the Google Drive folder.
          </p>
        </div>
        <button
          onClick={syncNow}
          disabled={syncing}
          className="flex-shrink-0 px-4 py-2.5 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-display text-lg tracking-wide hover:brightness-110 disabled:opacity-50 transition">
          {syncing ? 'Syncing…' : '⟳ Sync now'}
        </button>
      </div>

      {msg && (
        <div className="mb-4 p-3 rounded-lg border border-[var(--line)] text-sm text-[var(--text)] bg-[var(--bg-elev)]">
          {msg}
        </div>
      )}

      <div className="mb-5 text-xs text-[var(--text-faint)] font-mono">
        Last sync: {fmtTime(lastSync?.at)}
        {lastSync && ` · ${lastSync.total} slides in folder`}
      </div>

      {loading ? (
        <div className="text-[var(--text-faint)] text-sm py-8 text-center">Loading…</div>
      ) : slides.length === 0 ? (
        <div className="text-[var(--text-faint)] text-sm py-8 text-center border border-dashed border-[var(--line)] rounded-lg">
          No slides yet. Hit "Sync now" to pull them from the Drive folder, or
          check that the folder ID and API key are set up.
        </div>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
          {slides.map((s) => (
            <div key={s.id} className="rounded-lg overflow-hidden border border-[var(--line)] bg-black">
              <img src={s.public_url} alt="" className="w-full aspect-video object-contain bg-black" />
              <div className="px-2 py-1.5 flex items-center justify-between">

/** Read the queue on/off flag from app_settings, live. */
function useQueueEnabled() {
  const [enabled, setEnabled] = useState(null); // null = loading

  const load = useCallback(async () => {
    const { data, error } = await supabase
      .from('app_settings')
      .select('value')
      .eq('key', 'vinyl_queue_enabled')
      .single();
    if (error) { console.error(error); setEnabled(false); return; }
    setEnabled(data?.value === true || data?.value === 'true');
  }, []);

  useEffect(() => {
    load();
    const ch = supabase
      .channel('app_settings_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'app_settings' }, load)
      .subscribe();
    return () => { supabase.removeChannel(ch); };
  }, [load]);

  return enabled;
}

/** Read the live play queue (queued + playing), newest activity first. */
function usePlayQueue() {
  const [queue, setQueue] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    const { data, error } = await supabase
      .from('vinyl_play_queue')
      .select('*')
      .in('status', ['queued', 'playing'])
      .order('created_at', { ascending: true });
    if (error) console.error(error);
    setQueue(data || []);
    setLoading(false);
  }, []);

  useEffect(() => {
    load();
    const ch = supabase
      .channel('play_queue_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'vinyl_play_queue' }, load)
      .subscribe();
    return () => { supabase.removeChannel(ch); };
  }, [load]);

  // Sort: playing first, then queued by creation time
  const sorted = useMemo(() => {
    const order = { playing: 0, queued: 1 };
    return [...queue].sort((a, b) => {
      const d = (order[a.status] ?? 9) - (order[b.status] ?? 9);
      if (d !== 0) return d;
      return new Date(a.created_at) - new Date(b.created_at);
    });
  }, [queue]);

  return { queue: sorted, loading, reload: load };
}

// ----------------------------------------------------------------------------
// RANDOM GROOVE MODAL — slot-machine reel that picks an album from the stacks
// ----------------------------------------------------------------------------
function RandomGrooveModal({ inventory, onClose, onLockIn }) {
  // Pull only records that are available (not damaged/missing) to spin on
  const pool = useMemo(() => {
    return inventory.filter((r) => !r.status || r.status === 'available' || r.status === 'featured' || r.status === 'playing');
  }, [inventory]);

  const [phase, setPhase] = useState('spinning');   // 'spinning' | 'revealed'
  const [result, setResult] = useState(null);
  const [reelItems, setReelItems] = useState([]);
  const [flashKey, setFlashKey] = useState(0);

  // Pick a result + build a long reel of random covers that ends on the result
  const startSpin = useCallback(() => {
    if (pool.length === 0) return;
    const pick = pool[Math.floor(Math.random() * pool.length)];
    // Build a longer reel for a meatier spin: ~50 random covers, with the
    // final one being the pick. More covers + longer animation = more drama.
    const reel = [];
    for (let i = 0; i < 50; i++) {
      reel.push(pool[Math.floor(Math.random() * pool.length)]);
    }
    reel[reel.length - 1] = pick;       // last item is the chosen one
    setResult(pick);
    setReelItems(reel);
    setPhase('spinning');
    setFlashKey((k) => k + 1);
  }, [pool]);

  // Kick off the first spin on mount
  useEffect(() => { startSpin(); }, [startSpin]);

  // After the reel-spin animation, reveal the result.
  // CSS animation runs ~4.5s; we transition phase right at the end.
  useEffect(() => {
    if (phase !== 'spinning') return;
    const t = setTimeout(() => setPhase('revealed'), 4550);
    return () => clearTimeout(t);
  }, [phase, flashKey]);

  // Esc to close
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  if (pool.length === 0) {
    return (
      <div className="fixed inset-0 z-[60] flex items-center justify-center scrim-anim p-4"
        style={{ background: 'rgba(0,0,0,0.85)' }}
        onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
        <div className="bg-[var(--bg-elev)] border border-[var(--line)] rounded-2xl p-6 max-w-sm text-center">
          <div className="font-display text-2xl glow-pulse mb-2">No records to spin</div>
          <p className="text-sm text-[var(--text-dim)] mb-4">The stacks look empty — try again once records are added.</p>
          <button onClick={onClose} className="px-4 py-2 rounded-lg border border-[var(--line)]">Close</button>
        </div>
      </div>
    );
  }

  // The reel cell size — square covers at ~144px on mobile, 180px desktop
  // Each cell is reel-cell-size tall. The reel translates up by
  // (reelItems.length - 1) * cellSize so the last cell lands centered.
  const CELL = 144;     // px (mobile)
  const distance = (reelItems.length - 1) * CELL;

  return (
    <div key={flashKey}
      className={`fixed inset-0 z-[60] flex items-center justify-center p-4 scrim-anim ${phase === 'revealed' ? 'rg-flash-bg' : ''}`}
      style={{ background: 'rgba(0,0,0,0.88)', backdropFilter: 'blur(6px)' }}
      onClick={(e) => { if (e.target === e.currentTarget && phase === 'revealed') onClose(); }}>
      <div className="bg-[var(--bg-elev)] border border-[var(--line)] rounded-2xl w-full max-w-sm p-5 safe-bottom relative overflow-hidden">

        {/* Header */}
        <div className="text-center mb-4">
          <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-[var(--text-faint)]">
            Inner Groove · Fate Decides
          </div>
          <h2 className="font-display text-4xl glow-pulse leading-none mt-0.5">
            Random Groove
          </h2>
        </div>

        {/* Reel / Result viewport */}
        <div className="relative mx-auto mb-5"
          style={{ width: `${CELL}px`, height: `${CELL}px` }}>
          {/* Outer frame with hop-green border */}
          <div className={`absolute inset-0 rounded-xl border-2 border-[var(--hop)] overflow-hidden ${phase === 'revealed' ? 'rg-glow' : ''}`}
            style={{ boxShadow: '0 0 24px var(--hop-glow)' }}>
            {/* Spinning reel */}
            {phase === 'spinning' && reelItems.length > 0 && (
              <div className="rg-reel"
                style={{ '--rg-distance': `-${distance}px`, '--rg-duration': '4.5s' }}>
                {reelItems.map((r, i) => (
                  <div key={i} className="flex-shrink-0" style={{ width: `${CELL}px`, height: `${CELL}px` }}>
                    <CoverImage src={r.cover_url} alt="" />
                  </div>
                ))}
              </div>
            )}
            {/* Revealed result — replaces the reel so we get a clean bounce */}
            {phase === 'revealed' && result && (
              <div className="rg-reveal absolute inset-0" style={{ width: `${CELL}px`, height: `${CELL}px` }}>
                <CoverImage src={result.cover_url} alt={result.album} />
              </div>
            )}
          </div>
          {/* Subtle scan-line overlay during spin for that slot-machine feel */}
          {phase === 'spinning' && (
            <div className="pointer-events-none absolute inset-0 rounded-xl"
              style={{ background: 'linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.55) 100%)' }} />
          )}
        </div>

        {/* Spinning vs revealed footer */}
        {phase === 'spinning' ? (
          <div className="text-center">
            <div className="font-mono text-xs text-[var(--text-faint)] tracking-wider uppercase animate-pulse">
              Spinning the stacks…
            </div>
          </div>
        ) : (
          <div className="text-center">
            <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-[var(--hop)] mb-1">
              Fate has spoken
            </div>
            <div className="font-display text-2xl text-[var(--text)] leading-tight">{clean(result.album)}</div>
            <div className="text-sm text-[var(--text-dim)] mb-5">{clean(result.artist)}</div>

            <button onClick={() => onLockIn(result)}
              className="w-full py-3 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-display text-2xl tracking-wider hover:brightness-110 transition shadow-[0_0_24px_var(--hop-glow)]">
              🔒 Lock it in!
            </button>
            <div className="flex gap-2 mt-2">
              <button onClick={startSpin}
                className="flex-1 py-2.5 rounded-lg border border-[var(--line)] text-[var(--text)] font-display tracking-wider hover:border-[var(--hop)] hover:text-[var(--hop)] transition">
                🎲 Spin again
              </button>
              <button onClick={onClose}
                className="flex-1 py-2.5 rounded-lg border border-[var(--line)] text-[var(--text-dim)] hover:text-[var(--text)] transition">
                Cancel
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ----------------------------------------------------------------------------
// DISPLAY APP — the taproom TV (/display)
// ----------------------------------------------------------------------------
function DisplayApp() {
  const queueEnabled = useQueueEnabled();
  const { queue } = usePlayQueue();
  const [slides, setSlides] = useState([]);
  const [slideIdx, setSlideIdx] = useState(0);
  const [flash, setFlash] = useState(false);
  const prevCountRef = useRef(0);
  const hasLoadedRef = useRef(false);

  // Load slides (will be empty until Drop 2 sync runs — placeholder shows)
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const { data } = await supabase
        .from('display_slides')
        .select('*')
        .eq('active', true)
        .order('sort_order', { ascending: true });
      if (!cancelled) setSlides(data || []);
    })();
    const ch = supabase
      .channel('slides_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'display_slides' }, async () => {
        const { data } = await supabase.from('display_slides').select('*').eq('active', true).order('sort_order', { ascending: true });
        setSlides(data || []);
      })
      .subscribe();
    return () => { cancelled = true; supabase.removeChannel(ch); };
  }, []);

  // Advance slides every 8s
  useEffect(() => {
    if (slides.length === 0) return;
    const t = setInterval(() => setSlideIdx((i) => (i + 1) % slides.length), 8000);
    return () => clearInterval(t);
  }, [slides.length]);

  // Keep the screen awake (Wake Lock API). Re-acquires if the tab is
  // backgrounded then refocused (the OS releases the lock on visibility change).
  useEffect(() => {
    let wakeLock = null;
    let released = false;

    const acquire = async () => {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (e) {
        // Some browsers reject without a user gesture; the re-acquire on
        // visibilitychange / click usually picks it up shortly after.
      }
    };

    const onVisible = () => {
      if (document.visibilityState === 'visible' && !released) acquire();
    };

    acquire();
    document.addEventListener('visibilitychange', onVisible);
    // Any interaction (e.g. the remote click) is a good moment to (re)acquire
    document.addEventListener('click', acquire);

    return () => {
      released = true;
      document.removeEventListener('visibilitychange', onVisible);
      document.removeEventListener('click', acquire);
      if (wakeLock) { try { wakeLock.release(); } catch (e) {} }
    };
  }, []);

  // Flash the queue panel when a new item is added
  useEffect(() => {
    const queuedCount = queue.filter((q) => q.status === 'queued').length;
    // On the very first run, just record the count without flashing
    if (!hasLoadedRef.current) {
      hasLoadedRef.current = true;
      prevCountRef.current = queuedCount;
      return;
    }
    // Flash whenever the queued count goes UP (including empty → 1)
    if (queuedCount > prevCountRef.current) {
      setFlash(true);
      const t = setTimeout(() => setFlash(false), 2400);
      prevCountRef.current = queuedCount;
      return () => clearTimeout(t);
    }
    prevCountRef.current = queuedCount;
  }, [queue]);

  const showQueue = queueEnabled === true;

  return (
    <div className="fixed inset-0 bg-[var(--bg)] flex overflow-hidden">
      {/* Slides panel */}
      <div className={`relative h-full transition-all duration-700 ${showQueue ? 'w-3/4' : 'w-full'}`}>
        {slides.length > 0 ? (
          slides.map((s, i) => (
            <img key={s.id} src={s.public_url} alt=""
              className="absolute inset-0 w-full h-full object-contain bg-black transition-opacity duration-1000"
              style={{ opacity: i === slideIdx ? 1 : 0 }} />
          ))
        ) : (
          // Placeholder until Drop 2 wires in real slides
          <div className="absolute inset-0 flex flex-col items-center justify-center gap-6">
            <VinylSpinner size={140} />
            <div className="text-center">
              <div className="font-display text-5xl glow-pulse">Inner Groove Brewing</div>
              <div className="font-mono text-sm tracking-[0.3em] uppercase text-[var(--text-faint)] mt-2">
                Verona · PA
              </div>
            </div>
            <div className="font-mono text-[11px] tracking-[0.2em] uppercase text-[var(--text-faint)] absolute bottom-8">
              slides go here
            </div>
          </div>
        )}
      </div>

      {/* Queue panel */}
      {showQueue && (
        <div className={`relative h-full w-1/4 border-l-2 flex flex-col transition-all duration-300 ${
          flash ? 'border-[var(--hop)] queue-flash-glow' : 'border-[var(--line)]'
        }`}>
          <DisplayQueuePanel queue={queue} flash={flash} />
        </div>
      )}
    </div>
  );
}

// A QR code that renders to canvas via the qrcode CDN lib.
// Configurable URL so it's easy to point at test vs production.
const STACKS_QR_URL = 'https://inner-groove-vinyl.vercel.app';

function StacksQR({ size = 180 }) {
  // QR encodes STACKS_QR_URL, inlined as SVG so it always renders instantly
  // (no external library or service dependency). To change the URL, regenerate.
  return (
    <div className="bg-white rounded-xl p-3 inline-block shadow-[0_0_30px_var(--hop-glow)]">

function DisplayQueuePanel({ queue, flash }) {
  const playing = queue.find((q) => q.status === 'playing');
  const upNext  = queue.filter((q) => q.status === 'queued');

    return (
      <div className={`flex flex-col h-full bg-[var(--bg-elev)] ${flash ? 'queue-flash' : ''}`}>

  );
}

// ----------------------------------------------------------------------------
// Inline PIN gate for the Scan / Add-manually tabs on the bar page. Reuses the
// staff ADMIN_PIN and the same sessionStorage unlock flag as /admin.
// ----------------------------------------------------------------------------
function BarAddGate({ onUnlock }) {
  const [pin, setPin] = useState('');
  const [err, setErr] = useState('');
  const [shake, setShake] = useState(false);

  const submit = (e) => {
    e?.preventDefault?.();
    if (pin === BAR_ADD_PIN) {
      try { sessionStorage.setItem('igb_vinyl_bar_unlocked', '1'); } catch {}
      onUnlock();
    } else {
      setErr('Wrong PIN');
      setShake(true);
      setTimeout(() => setShake(false), 400);
      setPin('');
    }
  };

  return (
    <div className="max-w-xs mx-auto px-4 py-10">
      <form onSubmit={submit} className={shake ? 'vote-bump' : ''}>
        <div className="text-center mb-5">
          <div className="font-mono text-[10px] tracking-[0.25em] text-[var(--text-faint)] uppercase mb-1">
            Staff Only
          </div>
          <h2 className="font-display text-2xl glow-pulse leading-none">Enter PIN to add records</h2>
        </div>
        <input
          type="password"
          inputMode="numeric"
          autoFocus
          value={pin}
          onChange={(e) => { setPin(e.target.value); setErr(''); }}
          placeholder="PIN"
          className="w-full text-center font-mono text-2xl bg-[var(--bg-elev)] border border-[var(--line)] rounded-lg px-4 py-3 text-[var(--text)] placeholder:text-[var(--text-faint)] focus:outline-none focus:border-[var(--hop)] focus:ring-1 focus:ring-[var(--hop)] tracking-[0.5em]"
        />
        {err && <div className="text-center text-sm text-red-400 mt-2">{err}</div>}
        <button
          type="submit"
          className="mt-4 w-full py-3 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-display text-xl tracking-wider hover:brightness-110 transition shadow-[0_0_24px_var(--hop-glow)]"
        >
          Unlock
        </button>
      </form>
    </div>
  );
}

// BAR APP — bartender queue manager (/bar); Queue is open, Add tabs are PIN-gated
// ----------------------------------------------------------------------------
function BarApp() {
  const queueEnabled = useQueueEnabled();
  const { queue, reload } = usePlayQueue();
  const [history, setHistory] = useState([]);
  const [busy, setBusy] = useState(false);
  const [view, setView] = useState('queue'); // 'queue' | 'scan' | 'manual'
  const [addUnlocked, setAddUnlocked] = useState(() => {
    try { return sessionStorage.getItem('igb_vinyl_bar_unlocked') === '1'; }
    catch { return false; }
  });

  // Load recently-played for context
  const loadHistory = useCallback(async () => {
    const { data } = await supabase
      .from('vinyl_play_queue')
      .select('*')
      .in('status', ['done', 'skipped'])
      .order('played_at', { ascending: false })
      .limit(8);
    setHistory(data || []);
  }, []);
  useEffect(() => { loadHistory(); }, [loadHistory, queue]);

  const toggleQueue = async () => {
    setBusy(true);
    const next = !(queueEnabled === true);
    const { error } = await supabase
      .from('app_settings')
      .update({ value: next })
      .eq('key', 'vinyl_queue_enabled');
    setBusy(false);
    if (error) alert(error.message);
  };

  const setStatus = async (item, status) => {
    const patch = { status };
    if (status === 'playing' || status === 'done') patch.played_at = new Date().toISOString();
    const { error } = await supabase.from('vinyl_play_queue').update(patch).eq('id', item.id);
    if (error) { alert(error.message); return; }
    reload();
  };

  const clearDone = async () => {
    if (!confirm('Clear all played/skipped items from history?')) return;
    await supabase.from('vinyl_play_queue').delete().in('status', ['done', 'skipped']);
    loadHistory();
  };

  const playing = queue.find((q) => q.status === 'playing');
  const upNext  = queue.filter((q) => q.status === 'queued');

  return (
    <div className="min-h-screen bg-[var(--bg)]">
      <header className="sticky top-0 z-40 bg-[var(--bg)]/90 backdrop-blur-md border-b border-[var(--line)]">
        <div className="max-w-2xl mx-auto px-4 pt-3 pb-0">
          <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-[var(--text-faint)]">
            IGB · Bartender
          </div>
          <h1 className="font-display text-3xl glow-pulse leading-none mb-3">Vinyl Queue</h1>
          <nav className="flex gap-5 -mb-px overflow-x-auto">
            {[
              ['queue',  'Queue'],
              ['scan',   'Scan'],
              ['manual', 'Add manually'],
            ].map(([k, label]) => (
              <button
                key={k}
                onClick={() => setView(k)}
                className={`font-display text-lg pb-2 px-1 transition-colors whitespace-nowrap ${
                  view === k ? 'tab-active' : 'text-[var(--text-dim)] hover:text-[var(--text)]'
                }`}>
                {label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      {view === 'scan'   && (addUnlocked ? <ScanView />   : <BarAddGate onUnlock={() => setAddUnlocked(true)} />)}
      {view === 'manual' && (addUnlocked ? <ManualView /> : <BarAddGate onUnlock={() => setAddUnlocked(true)} />)}

      {view === 'queue' && (
      <div className="max-w-2xl mx-auto px-4 py-4">
        {/* Master toggle */}
        <button
          onClick={toggleQueue}
          disabled={busy || queueEnabled === null}
          className={`w-full mb-5 py-4 rounded-xl font-display text-2xl tracking-wider transition ${
            queueEnabled === true
              ? 'bg-[var(--hop)] text-[#0a1a02] shadow-[0_0_28px_var(--hop-glow)]'
              : 'border-2 border-[var(--line)] text-[var(--text-dim)]'
          }`}>
          {queueEnabled === null ? 'Loading…' : queueEnabled ? '● QUEUE IS ON — tap to turn off' : '○ QUEUE IS OFF — tap to turn on'}
        </button>

        {queueEnabled === false && (
          <div className="mb-5 p-3 rounded-lg border border-[var(--line)] text-[var(--text-faint)] text-sm text-center">
            While off: the TV shows slides full-screen and patrons can't add requests.
          </div>
        )}

        {/* Now playing */}
        <div className="mb-5">
          <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-[var(--hop)] mb-2">◉ On the deck</div>
          {playing ? (
            <div className="flex items-center gap-3 p-3 rounded-lg border border-[var(--hop-deep)] bg-[#6dc1350a]">
              <div className="w-14 h-14 flex-shrink-0 rounded overflow-hidden">
                <CoverImage src={playing.cover_url} alt={playing.album} />
              </div>
              <div className="flex-1 min-w-0">
                <div className="font-semibold text-[var(--text)] truncate">{clean(playing.album)}</div>
                <div className="text-sm text-[var(--text-dim)] truncate">{clean(playing.artist)}</div>
                <div className="flex items-center gap-2 mt-1">
                  {playing.side && (
                    <span className="inline-flex items-center px-2 h-6 rounded bg-[var(--hop)] text-[#0a1a02] font-display text-base leading-none">
                      SIDE {playing.side}
                    </span>
                  )}
                  {playing.requested_by && (
                    <span className="font-mono text-[10px] text-[var(--text-dim)] truncate">for {playing.requested_by}</span>
                  )}
                </div>
              </div>
              <button onClick={() => setStatus(playing, 'done')}
                className="px-5 py-3 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-display text-lg tracking-wider active:brightness-90">
                Done
              </button>
            </div>
          ) : (
            <div className="text-[var(--text-faint)] text-sm italic p-3 border border-dashed border-[var(--line)] rounded-lg text-center">
              Nothing on the deck. Tap "Play" on a queued record below.
            </div>
          )}
        </div>

        {/* Up next */}
        <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-[var(--text-faint)] mb-2">
          Up next · {upNext.length}
        </div>
        {upNext.length === 0 ? (
          <div className="text-[var(--text-faint)] text-sm italic py-6 text-center">No requests in the queue.</div>
        ) : (
          <ul className="space-y-2">
            {upNext.map((q, i) => (
              <li key={q.id} className="flex items-center gap-3 p-3 rounded-lg border border-[var(--line)] bg-[var(--bg-elev)]">
                <div className="font-display text-2xl text-[var(--text-faint)] w-7 text-center tabular-nums">{i + 1}</div>
                <div className="w-14 h-14 flex-shrink-0 rounded overflow-hidden">
                  <CoverImage src={q.cover_url} alt={q.album} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-[var(--text)] text-sm leading-tight line-clamp-2">{clean(q.album)}</div>
                  <div className="text-xs text-[var(--text-dim)] truncate">{clean(q.artist)}</div>
                  <div className="flex items-center gap-1.5 mt-1">
                    {q.side && (
                      <span className="inline-flex items-center px-1.5 h-5 rounded bg-[var(--hop)] text-[#0a1a02] font-display text-sm leading-none">
                        SIDE {q.side}
                      </span>
                    )}
                    {q.requested_by && (
                      <span className="font-mono text-[10px] text-[var(--text-faint)] truncate">{q.requested_by}</span>
                    )}
                  </div>
                </div>
                <div className="flex flex-col gap-1.5">
                  <button onClick={() => setStatus(q, 'playing')}
                    className="px-4 py-2.5 rounded-lg bg-[var(--hop)] text-[#0a1a02] font-display text-base tracking-wide active:brightness-90">
                    Play
                  </button>
                  <button onClick={() => setStatus(q, 'skipped')}
                    className="px-4 py-1.5 rounded-lg border border-[var(--line)] text-[var(--text-faint)] font-mono text-[10px] uppercase tracking-wider active:border-red-700 active:text-red-400">
                    Skip
                  </button>
                </div>
              </li>
            ))}
          </ul>
        )}

        {/* History */}
        {history.length > 0 && (
          <div className="mt-8">
            <div className="flex items-center justify-between mb-2">
              <div className="font-mono text-[10px] tracking-[0.25em] uppercase text-[var(--text-faint)]">Recently played</div>
              <button onClick={clearDone} className="font-mono text-[10px] uppercase tracking-wider text-[var(--text-faint)] hover:text-red-400">Clear</button>
            </div>
            <ul className="space-y-1">
              {history.map((h) => (
                <li key={h.id} className="flex items-center gap-2 text-xs text-[var(--text-faint)] py-1">
                  <span className={`font-mono text-[9px] uppercase ${h.status === 'skipped' ? 'text-red-500/70' : 'text-[var(--hop)]/70'}`}>
                    {h.status === 'skipped' ? 'skip' : 'done'}
                  </span>
                  <span className="truncate">{clean(h.album)} — {clean(h.artist)}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));

// Route based on URL path. Vercel rewrites /admin → /index.html so we can
// inspect window.location.pathname to decide which app to render.
const path = window.location.pathname.replace(/\/$/, '');
let RootComponent;
if (path === '/admin')        RootComponent = AdminApp;
else if (path === '/display') RootComponent = DisplayApp;
else if (path === '/bar')     RootComponent = BarApp;
else                          RootComponent = App;
root.render(<RootComponent />);
</script>
</body>
</html>
